name: Playwright Tests
on:
  workflow_call:
    inputs:
      project:
        description: 'Playwright project to run (chromium, firefox, webkit, or all)'
        type: string
        default: 'chromium'
        required: false

jobs:
  playwright-tests:
    timeout-minutes: 20
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up pnpm
        uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Get Playwright version
        id: playwright-version
        run: echo "version=$(pnpm ls @playwright/test --json | jq -r '.[0].devDependencies["@playwright/test"].version')" >> $GITHUB_OUTPUT
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}-${{ inputs.project }}
      - name: Install all browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true' && inputs.project == 'all'
        run: pnpm exec playwright install --with-deps
      - name: Install single browser
        if: steps.playwright-cache.outputs.cache-hit != 'true' && inputs.project != 'all'
        env:
          PROJECT: ${{ inputs.project }}
        run: pnpm exec playwright install --with-deps "$PROJECT"
      - name: Install Playwright deps (cached browsers)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: pnpm exec playwright install-deps
      - name: Run all browsers
        if: inputs.project == 'all'
        run: pnpm exec playwright test
      - name: Run single browser
        if: inputs.project != 'all'
        env:
          PROJECT: ${{ inputs.project }}
        run: pnpm exec playwright test --project="$PROJECT"
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: playwright-report-${{ inputs.project }}
          path: playwright-report/
          retention-days: 30
